{% extends 'library/base.html' %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h3>Form</h3>
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="javascript:history.back()" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
